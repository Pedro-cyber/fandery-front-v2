<div class="main-container">
  <app-header></app-header>

  <main>
    <ng-container *ngIf="product">
      <div class="main-product-container">

        <!-- THEME -->
        <div class="theme">
          <ng-container *ngIf="themeImages[product.theme]; else showThemeName">
            <a [routerLink]="['/product-list/theme', product.theme | slugify]">
              <img
                [src]="themeImages[product.theme]"
                [alt]="product.theme">
            </a>
          </ng-container>
          <ng-template #showThemeName>
            <span class="theme-name">{{ product.theme }}</span>
          </ng-template>
        </div>

        <!-- NAME -->
        <div class="name">
          <h1>{{ product.name_es || product.name }} ({{ product.legoId }})</h1>
        </div>

        <div class="product-detail-container">

          <!-- ========================= -->
          <!-- ROW 1: IMAGE + DESCRIPTION (DESKTOP ONLY) -->
          <!-- ========================= -->
          <div class="row align-items-start">

            <!-- IMAGE -->
            <div class="col-12 d-flex justify-content-center">
              <img
                class="product-image img-fluid"
                [src]="product.image"
                [alt]="product.name_es || product.name" />
            </div>

          </div>

          <!-- ========================= -->
          <!-- ROW 2: MOBILE PRICES -->
          <!-- ========================= -->
          <div class="row mt-4 d-md-none">
            <div class="col-12 prices-block">

              <!-- PRICE LIST -->
              <app-product-detail-prices
                [product]="product">
              </app-product-detail-prices>

              <!-- PRICE ALERT -->
              <app-price-alert
                [product]="product"
                [modalId]="'price-alert-mobile-' + product.legoId">
              </app-price-alert>

            </div>
          </div>

          <!-- ========================= -->
          <!-- ROW 4: DESKTOP ANALYTICS + PRICES -->
          <!-- ========================= -->
          <div class="row mt-4 d-none d-md-flex">

            <!-- DESKTOP: ANALYTICS -->
            <section class="col-md-6 analytics-block">
              <app-product-detail-analytics
                [product]="product"
                [historicalData]="historicalData">
              </app-product-detail-analytics>
            </section>

            <!-- DESKTOP: PRICE LIST + ALERT -->
            <div class="col-md-6 prices-block">

            <app-price-alert
              [product]="product"
              [modalId]="'price-alert-desktop-' + product.legoId">
            </app-price-alert>


              <app-product-detail-prices
                [product]="product">
              </app-product-detail-prices>

            </div>
          </div>

          <!-- ========================= -->
          <!-- ROW 5: MOBILE ANALYTICS -->
          <!-- ========================= -->
          <div class="row d-md-none mt-4">
            <section class="col-12 analytics-block">
              <app-product-detail-analytics
                [product]="product"
                [historicalData]="historicalData">
              </app-product-detail-analytics>
            </section>
          </div>

          <!-- ========================= -->
          <!-- FINAL ROW: DESCRIPTION (ALL DEVICES) -->
          <!-- ========================= -->
          <div class="row mt-5">
            <section class="col-12 description-block">

              <app-product-detail-description
                [product]="product">
              </app-product-detail-description>

            </section>
          </div>

        </div>
      </div>
    </ng-container>
  </main>

  <app-footer></app-footer>
</div>
