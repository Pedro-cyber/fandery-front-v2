<div class="main-container">
  <app-header></app-header>

  <main>
    <ng-container *ngIf="product">
      <div class="main-product-container">

        <!-- THEME -->
        <div class="theme">
          <ng-container *ngIf="themeImages[product.theme]; else showThemeName">
            <a [routerLink]="['/product-list/theme', product.theme | slugify]">
              <img
                [src]="themeImages[product.theme]"
                [alt]="product.theme">
            </a>
          </ng-container>
          <ng-template #showThemeName>
            <span class="theme-name">{{ product.theme }}</span>
          </ng-template>
        </div>

        <!-- NAME -->
        <div class="name">
          <h1>{{ product.name_es || product.name }} ({{ product.legoId }})</h1>
        </div>

        <div class="product-detail-container">

        <!-- ========================= -->
        <!-- ROW 1: IMAGE + DESKTOP PRICES -->
        <!-- ========================= -->
        <div class="row">

          <!-- IMAGE -->
          <div class="col-12 col-md-6 d-flex justify-content-center">
            <img
              class="product-image img-fluid"
              [src]="product.image"
              [alt]="product.name_es || product.name" />
          </div>

          <!-- DESKTOP: PRICE LIST + ALERT -->
          <div class="col-md-6 prices-block d-none d-md-block">

            <app-price-alert
              [product]="product"
              [modalId]="'price-alert-desktop-' + product.legoId">
            </app-price-alert>

            <app-product-detail-prices
              [product]="product">
            </app-product-detail-prices>

          </div>

        </div>

          <!-- ========================= -->
          <!-- ROW 2: MOBILE PRICES -->
          <!-- ========================= -->
          <div class="row mt-4 d-md-none">
            <div class="col-12 prices-block">

              <!-- PRICE LIST -->
              <app-product-detail-prices
                [product]="product">
              </app-product-detail-prices>

              <!-- PRICE ALERT -->
              <app-price-alert
                [product]="product"
                [modalId]="'price-alert-mobile-' + product.legoId">
              </app-price-alert>

            </div>
          </div>

          <!-- ========================= -->
          <!-- ROW 4: DESKTOP ANALYTICS -->
          <!-- ========================= -->
          <div class="row mt-4 d-none d-md-flex">

            <!-- DESKTOP: ANALYTICS -->
            <section class="col-12 analytics-block">
              <app-product-detail-analytics
                [product]="product"
                [historicalData]="historicalData">
              </app-product-detail-analytics>
            </section>
          </div>

          <!-- ========================= -->
          <!-- ROW 5: MOBILE ANALYTICS -->
          <!-- ========================= -->
          <div class="row d-md-none mt-4">
            <section class="col-12 analytics-block">
              <app-product-detail-analytics
                [product]="product"
                [historicalData]="historicalData">
              </app-product-detail-analytics>
            </section>
          </div>

          <!-- ========================= -->
          <!-- FINAL ROW: DESCRIPTION (ALL DEVICES) -->
          <!-- ========================= -->
          <div class="row mt-5">
            <section class="col-12 description-block">

              <app-product-detail-description
                [product]="product">
              </app-product-detail-description>

            </section>
          </div>


        </div>

      </div>
      <!-- ========================= -->
          <!-- RELATED PRODUCTS CAROUSEL -->
          <!-- ========================= -->
          <div class="row mt-5">
            <section class="col-12 related-carousel-block">

              <h2 class="mb-4">Te puede interesar</h2>
              <swiper *ngIf="isBrowser && relatedProducts?.length"
                [slidesPerView]="4"
                [slidesPerGroup]="4"
                [spaceBetween]="16"
                [navigation]="true"
                [loop]="false"
                [breakpoints]="{
                  '0': { slidesPerView: 1, slidesPerGroup: 1 },
                  '768': { slidesPerView: 2, slidesPerGroup: 2 },
                  '992': { slidesPerView: 4, slidesPerGroup: 4 }
                }"
              >
                <ng-template swiperSlide *ngFor="let related of relatedProducts">
                  <app-product-card [product]="related"></app-product-card>
                </ng-template>
              </swiper>

            </section>
          </div>
    </ng-container>
  </main>

  <app-footer></app-footer>
</div>
